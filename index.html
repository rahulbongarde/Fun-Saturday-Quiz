<!DOCTYPE html>
<html>

<head>
    <title>Fun Saturday Quiz</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <h1>🏆 FUN SATURDAY QUIZ 🏆</h1>

    <div class="team">
        <h2>Team A</h2>
        <div class="score" id="scoreA">0</div>
    </div>

    <div class="team">
        <h2>Team B</h2>
        <div class="score" id="scoreB">0</div>
    </div>

    <h2 id="question">
        Press Start Quiz
    </h2>

    <div class="timer" id="timer">
        10
    </div>

    <h2 id="answer" style="display:none;color:green;">
        Answer
    </h2>

    <h2 id="winner" style="color:green;">
        🏆 Winner : Waiting...
    </h2>
<h3>📱 Scan QR To Join</h3>

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://rahulbongarde.github.io/Fun-Saturday-Quiz/join.html"
width="220">
    <h3>📱 Submitted Answers</h3>

    <div id="liveAnswers"></div>

    <br>

    <button onclick="startQuiz()">
        Start Quiz
    </button>

    <button onclick="nextQuestion()">
        Next Question
    </button>

    <br><br>

    <button onclick="addScoreA()">
        + Team A
    </button>

    <button onclick="addScoreB()">
        + Team B
    </button>

    <script src="./questions.js"></script>
    <script src="./app.js"></script>
    <script src="./live.js"></script>

</body>

</html>
