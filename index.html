```html
<!DOCTYPE html>
<html>

<head>
    <title>Fun Saturday Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🏆 FUN SATURDAY QUIZ 🏆</h1>

    <div class="team">
        <h2>Team A</h2>
        <div class="score" id="scoreA">0</div>
    </div>

    <div class="team">
        <h2>Team B</h2>
        <div class="score" id="scoreB">0</div>
    </div>

    <h2 id="question">
        Press Start Quiz
    </h2>

    <div class="timer" id="timer">
        10
    </div>

    <h2 id="answer"
        style="display:none;color:green;">
        Answer
    </h2>

    <h2>📱 Live Answers</h2>

    <div id="liveAnswers"></div>

    <br>

    <button onclick="startQuiz()">
        Start Quiz
    </button>

    <button onclick="nextQuestion()">
        Next Question
    </button>

    <br><br>

    <button onclick="addScoreA()">
        + Team A
    </button>

    <button onclick="addScoreB()">
        + Team B
    </button>

    <script type="module" src="app.js"></script>

</body>

</html>
```
